<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet" focusable="false">
  <title id="title">Three-rod abacus reference</title>
  <desc id="desc">A polished educational abacus showing hundreds, tens and ones.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFFDF7"/><stop offset="1" stop-color="#FFF5DA"/></linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#204F75"/><stop offset="1" stop-color="#123A5A"/></linearGradient>
  </defs>
  <rect x="20" y="20" width="680" height="380" rx="32" fill="#F8FBFE"/>
  <rect x="42" y="38" width="636" height="305" rx="24" fill="url(#panel)" stroke="url(#frame)" stroke-width="14"/>
  <g stroke="#70859A" stroke-width="10" stroke-linecap="round">
    <line x1="190" y1="78" x2="190" y2="306"/><line x1="360" y1="78" x2="360" y2="306"/><line x1="530" y1="78" x2="530" y2="306"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="4">
    <circle cx="190" cy="270" r="27" fill="#FF6B6B"/><circle cx="190" cy="216" r="27" fill="#FF6B6B"/><circle cx="190" cy="162" r="27" fill="#FF6B6B"/>
    <circle cx="360" cy="270" r="27" fill="#3A86FF"/><circle cx="360" cy="216" r="27" fill="#3A86FF"/>
    <circle cx="530" cy="270" r="27" fill="#55C271"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#19496D" text-anchor="middle">
    <text x="190" y="386">Hundreds</text><text x="360" y="386">Tens</text><text x="530" y="386">Ones</text>
  </g>
</svg>
